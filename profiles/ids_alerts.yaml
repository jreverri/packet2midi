name: "Auditory IDS Alerts"
scale: [48, 51, 60, 63, 72, 75] # C-Minor 7th (Tense)
mappings:
  tcp:
    note_offset: 0
    velocity_source: "size"
    cc:
      1: "size"       # Mod Wheel -> Alert Intensity
  udp:
    note_offset: 0
    velocity_source: "fixed"
    fixed_velocity: 64
  icmp:
    fixed_note: 24    # Sub-Bass Warning
    velocity: 127
  security_alert:     # Special mapping for high-entropy/scans
    fixed_note: 84    # High C (Warning siren)
    velocity: 127
